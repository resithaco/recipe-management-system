<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/burger.png">
    <title>LezzetJet</title>
    <link rel="stylesheet" href="user.css">
</head>
<body>
<header class="topbar glass">
    <div class="topbar-inner">
        <div class="topbar-main">
            <div class="logo-wrap">
                <div class="logo-mark">LJ</div>
                <div class="brand-copy">
                    <small>yemek siparişi</small>
                    <strong>LezzetJet</strong>
                </div>
            </div>
            <button class="location-trigger ripple" id="openLocationButton" type="button" aria-label="Konum seç">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 21s6-5.2 6-11a6 6 0 1 0-12 0c0 5.8 6 11 6 11Z"></path>
                    <circle cx="12" cy="10" r="2.2"></circle>
                </svg>
                <div class="location-copy">
                    <small>Teslimat adresi</small>
                    <strong id="locationText">Yükleniyor...</strong>
                </div>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6"></path>
                </svg>
            </button>
        </div>
        <label class="search-shell" for="searchInput">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="Restoran veya yemek ara...">
        </label>
    </div>
</header>
<div class="container">
    <div id="tariffs" class="cards"></div>
</div>
<nav class="bottom-nav glass" aria-label="Mobil menü">
    <button class="ripple active" type="button" data-nav="home">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5"></path>
            <path d="M5.5 9.5V20h13V9.5"></path>
        </svg>
        <span>Ana Sayfa</span>
    </button>
    <button class="ripple" type="button" data-nav="search">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
        </svg>
        <span>Ara</span>
    </button>
    <button class="ripple" type="button" data-nav="orders">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 7h15l-1.5 7.5H8L6 4H3"></path>
            <circle cx="9" cy="19" r="1.5"></circle>
            <circle cx="18" cy="19" r="1.5"></circle>
        </svg>
        <span>Siparişler</span>
        <span class="mini-badge" id="bottomCartBadge">0</span>
    </button>
    <button class="ripple" type="button" data-nav="profile">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 21a7 7 0 0 0-14 0"></path>
            <circle cx="12" cy="8" r="4"></circle>
        </svg>
        <span>Profil</span>
    </button>
</nav>
<script src="user.js"></script>
<script src="location.js"></script>
</body>
</html>
