<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/burger.png">
    <title>LezzetJet</title>
    <link rel="stylesheet" href="user.css">
    <link rel="stylesheet" href="restaurantPage.css">
</head>
<body>
<header class="topbar glass">
    <div class="topbar-inner">
        <div class="topbar-main">
            <div class="logo-wrap">
                <div class="logo-mark">LJ</div>
                <div class="brand-copy">
                    <small>yemek siparişi</small>
                    <strong>LezzetJet</strong>
                </div>
            </div>
            <button class="location-trigger ripple" id="openLocationButton" type="button" aria-label="Konum seç">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 21s6-5.2 6-11a6 6 0 1 0-12 0c0 5.8 6 11 6 11Z"></path>
                    <circle cx="12" cy="10" r="2.2"></circle>
                </svg>
                <div class="location-copy">
                    <small>Teslimat adresi</small>
                    <strong id="locationText">Yükleniyor...</strong>
                </div>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6"></path>
                </svg>
            </button>
        </div>
        <label class="search-shell" for="searchInput">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="Restoran veya yemek ara...">
        </label>
    </div>
</header>

<div id="HomePage" class="container">
    <section class="section">
        <div class="section-heading">
            <h2>Kategoriler</h2>
            <button id="clearFilterButton" class="ghost-button ripple" id="clearFilterButton" type="button">Filtreyi temizle</button>
        </div>
        <div class="category-row" id="categoryRow"></div>
    </section>
    <div id="tariffs" class="cards"></div>
</div>
<nav class="bottom-nav glass" aria-label="Mobil menü">
    <button class="ripple " type="button" data-nav="home">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5 12 3l9 7.5"></path>
            <path d="M5.5 9.5V20h13V9.5"></path>
        </svg>
        <span>Ana Sayfa</span>
    </button>
    <button class="ripple" type="button" data-nav="search">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
        </svg>
        <span>Ara</span>
    </button>
    <button class="ripple" type="button" data-nav="orders">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 7h15l-1.5 7.5H8L6 4H3"></path>
            <circle cx="9" cy="19" r="1.5"></circle>
            <circle cx="18" cy="19" r="1.5"></circle>
        </svg>
        <span>Siparişler</span>
        <span class="mini-badge" id="bottomCartBadge">0</span>
    </button>
    <button class="ripple" type="button" data-nav="profile">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 21a7 7 0 0 0-14 0"></path>
            <circle cx="12" cy="8" r="4"></circle>
        </svg>
        <span>Profil</span>
    </button>
</nav>
<div class="restaurant-page" id="restaurantPage" style="display:none;">
    <div class="top-bar">
        <button onclick="app.goBack()">⬅</button>
        <h2 id="resName"></h2>
    </div>
    <div class="restaurant-header">
        <img id="resImage">
    </div>
    <div class="menu-grid" id="menu"></div>
</div>
<div id="cartPage" class="cart-page" style="display:none;">
    <div class="top-bar">
        <button onclick="app.closeCart()">⬅</button>
        <h2>Sepetim</h2>
    </div>
    <div id="cartItems" class="cart-items">
        </div>
    <div class="cart-footer">
        <div class="total-info">
            <span>Toplam:</span>
            <strong id="totalPrice">0 TL</strong>
        </div>
        <button class="checkout-btn" onclick="app.checkout()">Siparişi Tamamla</button>
    </div>
</div>
<div id="cartFloatingButton" class="cart-fab" onclick="app.openCart()">
    <span class="cart-count" id="cartCount">0</span>
    🛒
</div>
<div id="profilePage" class="profile-page" style="display:none;">
    <div class="top-bar">
        <button onclick="app.closeProfile()">⬅</button>
        <h2>Profilim</h2>
    </div>
    
    <div class="profile-container">
        <div class="profile-header">
            <div class="avatar-circle">R</div>
            <h3 id="displayUserName">Kullanıcı Adı</h3>
            <p id="displayUserEmail">email@example.com</p>
        </div>

        <form id="profileForm" class="profile-form">
            <div class="form-group">
                <label>Ad Soyad</label>
                <input type="text" id="profileName" placeholder="Adınızı girin">
            </div>
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="profileEmail" placeholder="E-postanızı girin">
            </div>
            <div class="form-group">
                <label>Yeni Şifre</label>
                <input type="password" id="profilePass" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Telefon</label>
                <input type="tel" id="profilePhone" placeholder="05xx xxx xx xx">
            </div>
            
            <button type="submit" class="save-profile-btn">Bilgileri Güncelle</button>
        </form>
        <div class="account-stats">
            <div class="stat-card">
                <strong id="statOrderCount">0</strong>
                <span>Sipariş</span>
            </div>
            <div class="stat-card">
                <strong>0 TL</strong>
                <span>Cüzdan</span>
            </div>
        </div>
    </div>
    <button onclick="app.logOut()" class="logout-btn">Oturumu Kapat</button>
</div>
<script src="user.js"></script>
<script src="location.js"></script>
</body>
</html>
