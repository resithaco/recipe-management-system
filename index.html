<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LezzetJet</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card">
            <form onsubmit="user.LogIn(event)" class="card-face card-front" >
                <div class="app-name">LezzetJet</div>
                <h2>Giriş Yap</h2>
                <label for="username" class="input-group">
                    <input type="text" id="username" placeholder="kullanıcı adı" required>
                </label>
                <label for="password" class="input-group">
                    <input type="password" id="password" placeholder="Şifre" required>
                </label>
                <button type="submit">Giriş Yap</button>
                <button type="button" onclick="flipCard()">Kayıt Ol</button>
                <a href="#">Şifremi Unuttum?</a>
            </form>
            <form onsubmit="user.Register(event)" class="card-face card-back">
                <div class="app-name">LezzetJet</div>
                <h2>Kayıt Ol</h2>
                <label for="newUsername" class="input-group">
                    <input type="text" id="newUsername" placeholder="Kullanıcı Adı" required>
                </label>
                <label for="newEmail" class="input-group">
                    <input type="email" id="newEmail" placeholder="E-posta Adresi" required>
                </label>
                <label for="password" class="input-group">
                    <input type="password" id="newPassword" placeholder="Şifre" required>
                </label>
                <div class="select-group">
                    <select class="accountType" id="accountType" required>
                        <option value="">Hesap Türünü Seç</option>
                        <option value="restaurant">🍔 Restoran</option>
                        <option value="user">👤 Müşteri</option>
                        <option value="delivery">🛵 Kurye</option>
                    </select>
                    <span class="select-arrow">
                        ▼
                    </span>
                </div>
                <button  type="submit" >Kayıt Ol</button>
                <button type="button" onclick="flipCard()">Geri Dön</button>
            </form>
        </div>
    </div>
</body>
<script src="index.js"></script>
</html>
