<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="images/burger.png">
<title>Add Recipe</title>
<link rel="stylesheet" href="index.css">
</head>

<body>
<div></div>
<nav class="navbar">
  <a href="#">iletişm</a>
  <a href="index.html" class="active"> Tarife ekleme</a>
  <a href="Registration.html"> Öye Ol</a>
</nav>

<div class="container">
  <div class="add-section">
    <h2>Tarife Ekle</h2>

    <form onsubmit="app.addRecipe(event)">
      <input type="text" id="recipe" placeholder="Tarife Adı" required>
      <input type="text" id="ingredient" placeholder="Malzemeler (virgülle ayrılmış)" required>
      <input type="text" id="imageUrl" placeholder="Resim URL'sini buraya girin">

      <button type="submit">Tarife Ekle</button>
    </form>

  </div>
</div>
<div class="container">
  <div class="display-section">
    <h2>Tarifeler</h2>
    <div id="tariffs" class="cards"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
